[tasks.vet]
description = "Validate CUE module"
run = "cd quadlets && cue vet ./..."

[tasks.test]
description = "Run golden file tests via cue vet"
run = """
#!/usr/bin/env bash
set -euo pipefail

cd testing

failed=0
passed=0

for dir in */; do
    [[ "$dir" == "cue.mod/" ]] && continue

    name=$(basename "$dir")

    if cue vet "./$dir" 2>&1; then
        echo "PASS  $name"
        passed=$((passed + 1))
    else
        echo "FAIL  $name"
        failed=$((failed + 1))
    fi
done

echo ""
echo "Results: $passed passed, $failed failed"
[[ $failed -eq 0 ]]
"""

[tasks."test:update"]
description = "Regenerate golden files from current output"
run = """
#!/usr/bin/env bash
set -euo pipefail

cd testing

for dir in */; do
    [[ "$dir" == "cue.mod/" ]] && continue

    name=$(basename "$dir")
    cue eval -t mode=update "./$dir" -e test.actual --out text | head -c -1 > "$dir/expected.quadlets"
    echo "UPDATED  $name"
done

echo ""
echo "All golden files regenerated."
"""

# --- Publishing ---

[tasks.registry]
description = "Start local OCI registry"
run = """
#!/usr/bin/env bash
set -euo pipefail

port="${CUE_REGISTRY_PORT:-5100}"

if curl -sf "http://localhost:$port/v2/" > /dev/null 2>&1; then
    echo "Registry already running on :$port"
else
    echo "Starting registry on :$port..."
    nohup cue mod registry "localhost:$port" > /tmp/cue-registry.log 2>&1 &
    sleep 1
    curl -sf "http://localhost:$port/v2/" > /dev/null 2>&1 || {
        echo "Failed to start registry. Check /tmp/cue-registry.log"
        exit 1
    }
    echo "Registry started."
fi
"""

[tasks.publish]
description = "Publish module to GHCR (requires PUBLISH_VERSION, e.g. PUBLISH_VERSION=v0.0.16 mise run publish)"
run = """
#!/usr/bin/env bash
set -euo pipefail

: "${PUBLISH_VERSION:?Set PUBLISH_VERSION (e.g. v0.0.16)}"

GHCR_OWNER="${GHCR_OWNER:-lugoues}"
export CUE_REGISTRY='inline:moduleRegistries: "github.com/'"${GHCR_OWNER}"'": {registry: "ghcr.io/'"${GHCR_OWNER}"'/cue-modules", stripPrefix: true}'

cd quadlets
module=$(cue eval -e 'module' ./cue.mod/module.cue --out text)
echo "Publishing ${module}@${PUBLISH_VERSION} to ghcr.io/${GHCR_OWNER}/cue-modules ..."
cue mod publish "$PUBLISH_VERSION"
echo "Published $PUBLISH_VERSION"
"""

