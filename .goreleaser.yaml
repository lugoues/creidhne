version: 2

project_name: creidhne

before:
  hooks:
    - go mod tidy

builds:
  - id: crei
    main: ./cmd/crei
    binary: crei
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/lugoues/creidhne/internal/cli.version={{ .Version }}
      - -X github.com/lugoues/creidhne/internal/cli.commit={{ .Commit }}
      - -X github.com/lugoues/creidhne/internal/cli.date={{ .Date }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

