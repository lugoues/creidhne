version: 2

project_name: creidhne

before:
  hooks:
    - go mod tidy

builds:
  - id: crei
    main: ./cmd/crei
    binary: crei
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/lugoues/creidhne/internal/cli.version={{ .Version }}
      - -X github.com/lugoues/creidhne/internal/cli.commit={{ .Commit }}
      - -X github.com/lugoues/creidhne/internal/cli.date={{ .Date }}

archives:
    # Publish the bare `crei` binaries (no tar.gz wrapper). The os/arch suffix
    # keeps the release asset names unique across the build matrix.
  - formats: [binary]
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  # One <artifact>.sha256 per binary rather than a single aggregated file, so a
  # user downloading one binary fetches just its checksum. With split set, the
  # name defaults to "{{ .ArtifactName }}.{{ .Algorithm }}".
  split: true

# Keyless cosign signatures, one sigstore bundle per binary. artifacts: binary
# signs the binaries themselves (valid because the archive format is binary), so
# a user verifies the binary directly rather than going via the checksum:
#   cosign verify-blob --bundle crei_<ver>_linux_amd64.sigstore.json \
#     --certificate-identity-regexp '^https://github.com/lugoues/creidhne/' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     crei_<ver>_linux_amd64
# Keyless signing needs the release workflow's id-token:write + cosign installed.
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    artifacts: binary
    output: '{{ not (isEnvSet "CI") }}'
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - --yes

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"