# Developer tooling for the Creidhne repo. mise provisions the toolchain and
# wraps common dev tasks; it is NOT required to *use* the binary.

[tools]
cue = "0.16.0"
go = "latest"
aube = "latest"
"npm:@withgraphite/graphite-cli" = "stable"
"aqua:tombi-toml/tombi" = "0.9.20"
golangci-lint = "2.12.2"
"aqua:cli/cli" = "latest"

[settings]
activate_aggressive = true
aqua.minisign = true
aqua.slsa = true
auto_install = true
disable_backends = ["asdf", "gen", "dotnet", "spm", "ubi", "bun"]
exec_auto_install = true
experimental = true
idiomatic_version_file_enable_tools = []
jobs = 8
lockfile = true
not_found_auto_install = true
npm = { package_manager = "aube", bun = false }
plugin_autoupdate_last_check_duration = "2d"
task.output = "keep-order"
use_versions_host = true

# --- Dev tasks ---
[tasks.build]
description = "Build the crei binary into ./bin"
run = "go build -o bin/crei ./cmd/crei"

[tasks."cue:vet"]
description = "Validate the CUE schema module"
dir = "{{config_root}}/creidhne"
run = "cue vet"

[tasks."go:test"]
description = ""
run = "go test -v ./..."

[tasks.test]
description = "Run Go tests and validate the CUE schema"
depends = ["go:test", "cue:vet"]

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.gen]
description = "Regenerate systemd [Unit]/[Service]/[Install] schema from the vendored gperf"
run = "go run ./tools/gen-systemd-sections"

[tasks.tidy]
description = "Tidy Go module dependencies"
run = "go mod tidy"

[tasks.snapshot]
description = "Build a local release snapshot with goreleaser"
run = "goreleaser release --snapshot --clean"
