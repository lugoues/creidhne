name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1, provisions go + cue
      - run: mise exec -- go build ./...
      - run: mise run go:test
      - run: mise run cue:vet # cue vet the schema module
      - name: Generated schema is up to date
        run: |
          mise run gen
          git diff --exit-code -- creidhne/systemd_sections.gen.cue templates/systemd_sections.gen.tpl

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          # golangci-lint v2.4.0+ supports Go 1.25; pin for reproducible CI.
          version: v2.4.0
