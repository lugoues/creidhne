name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2 # provisions go + cue
      - run: go build ./...
      - run: go test ./...
      - run: mise run vet # cue vet the schema module

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v8
        with:
          # golangci-lint v2.4.0+ supports Go 1.25; pin for reproducible CI.
          version: v2.4.0
