name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v2 # provisions go + cue
      - run: mise exec -- go build ./...
      - run: mise run go:test
      - run: mise run cue:vet # cue vet the schema module
      - name: Generated schema is up to date
        run: |
          mise run gen
          git diff --exit-code -- creidhne/systemd_sections.gen.cue templates/systemd_sections.gen.tpl

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v8
        with:
          # golangci-lint v2.4.0+ supports Go 1.25; pin for reproducible CI.
          version: v2.4.0
